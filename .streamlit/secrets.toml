# ============================================================
# Streamlit Secrets 파일 (민감 정보 관리)
# 위치: {프로젝트}/.streamlit/secrets.toml
#
# ※ 주의: 이 파일은 .gitignore에 추가해야 합니다!
#          절대 git에 커밋하지 마세요.
#
# 사용법 (코드에서 접근):
#   st.secrets["aws"]["region"]
#   st.secrets["app"]["default_system_prompt"]
# ============================================================

# ── AWS 설정 ──────────────────────────────────────────────
# SageMaker 환경에서는 IAM Role이 자동 처리하므로 키 불필요
# EC2/로컬 환경에서 직접 키를 사용할 경우 아래 주석 해제
[aws]
region = "us-east-1"
model_id = "us.anthropic.claude-sonnet-4-6"

# 직접 키 사용 시 (SageMaker에서는 불필요)
# aws_access_key_id = "AKIA..."
# aws_secret_access_key = "..."


# ── 앱 설정 ───────────────────────────────────────────────
[app]
default_system_prompt = "당신은 친절하고 유능한 AI 어시스턴트입니다. 한국어로 답변하세요."
max_tokens_default = 1024
temperature_default = 0.7
